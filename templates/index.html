<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI守秘人 - 克苏鲁呼唤</title>
    <!-- ===== PWA 支持 ===== -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a6cff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: #f0f0f0;
        }
        .main-layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            gap: 20px;
            height: 90vh;
        }
        .chat-container {
            flex: 2;
            background: #2c2c2c;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .chat-header {
            background: #3a3a3a;
            padding: 8px 20px;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            border-bottom: 1px solid #555;
            flex-shrink: 0;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user {
            align-self: flex-end;
            background: #0a6cff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant {
            align-self: flex-start;
            background: #3e3e3e;
            color: #f0f0f0;
            border-bottom-left-radius: 4px;
        }
        .audio-btn {
            margin-top: 6px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 0;
            color: #ffaa44;
            margin-left: 8px;
        }
        .input-area {
            display: flex;
            padding: 16px;
            border-top: 1px solid #555;
            gap: 8px;
            background: #2c2c2c;
            border-radius: 0 0 16px 16px;
        }
        input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #555;
            border-radius: 24px;
            font-size: 16px;
            background: #1e1e1e;
            color: white;
            outline: none;
        }
        button {
            background: #0a6cff;
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 24px;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled { background: #555; cursor: not-allowed; }
        .loading { text-align: center; color: #aaa; margin-top: 8px; }

        /* ===== 监控面板 - 完整角色卡样式 ===== */
        .monitor-panel {
            flex: 3;
            background: #2c2c2c;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            min-width: 320px;
            transition: min-width 0.25s ease, flex 0.25s ease, padding 0.25s ease;
        }
        .monitor-panel.collapsed {
            min-width: 48px;
            flex: 0 0 48px;
            padding: 16px 6px;
            overflow: hidden;
        }
        .monitor-header {
            margin-bottom: 12px;
            border-bottom: 1px solid #555;
            padding-bottom: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .monitor-header .monitor-title {
            font-weight: bold;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            transition: opacity 0.15s, width 0.15s;
        }
        .monitor-panel.collapsed .monitor-title {
            opacity: 0;
            width: 0;
            margin: 0;
        }
        .monitor-panel.collapsed .monitor-header {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .toggle-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            flex-shrink: 0;
            line-height: 1;
        }
        .toggle-btn:hover {
            color: #ffaa44;
            background: #3a3a3a;
        }
        .monitor-body {
            overflow-y: auto;
            flex: 1;
            transition: opacity 0.2s ease;
        }
        .monitor-panel.collapsed .monitor-body {
            opacity: 0;
            display: none;
        }

        /* 角色卡容器 */
        .player-card {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        /* 头部信息 */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .card-name {
            font-size: 20px;
            font-weight: bold;
            color: #ffaa44;
        }
        .card-subtitle {
            font-size: 13px;
            color: #aaa;
        }
        .card-id {
            font-size: 10px;
        }
        .delete-btn {
            font-size: 11px;
            color: #ff6b6b;
            background: none;
            border: 1px solid #ff6b6b;
            border-radius: 6px;
            padding: 2px 8px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s, background 0.2s;
            margin-left: 6px;
        }
        .delete-btn:hover {
            opacity: 1;
            background: rgba(255, 107, 107, 0.15);
            color: #555;
        }

        /* 六维属性行 */
        .attrs-row {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .attr-box {
            flex: 1;
            min-width: 55px;
            text-align: center;
            background: #2a2a2a;
            border-radius: 8px;
            padding: 6px 4px;
        }
        .attr-label {
            font-size: 11px;
            color: #888;
            display: block;
        }
        .attr-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd966;
            display: block;
            margin-top: 2px;
        }
        .attr-bar {
            height: 3px;
            background: #444;
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        .attr-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd966, #ffaa44);
            border-radius: 2px;
            transition: width 0.3s;
        }

        /* 衍生属性网格 */
        .derived-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 14px;
        }
        .derived-item {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 6px 8px;
            text-align: center;
        }
        .derived-label {
            font-size: 11px;
            color: #888;
        }
        .derived-value {
            font-size: 15px;
            font-weight: bold;
            color: #88ff88;
        }
        .derived-value.san { color: #ff8888; }
        .derived-value.hp { color: #ff6688; }
        .derived-value.mp { color: #88aaff; }
        .derived-value.luck { color: #88ff88; }

        /* 技能区域 */
        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #ccc;
            margin: 12px 0 8px 0;
            padding-bottom: 4px;
            border-bottom: 1px solid #3a3a3a;
            cursor: pointer;
            user-select: none;
        }
        .section-title:hover { color: #ffaa44; }
        .section-title .arrow { color: #666; margin-right: 4px; }
        .skills-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }
        .skill-item {
            display: flex;
            justify-content: space-between;
            padding: 2px 6px;
            background: #252525;
            border-radius: 4px;
            font-size: 12px;
        }
        .skill-name { color: #ccc; }
        .skill-value { color: #6af; font-weight: bold; }

        /* 物品和法术 */
        .items-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }
        .item-tag {
            background: #2d2d3d;
            color: #aac;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        .spell-tag {
            background: #3d1d2d;
            color: #faa;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        .empty-text {
            color: #555;
            font-size: 12px;
            font-style: italic;
        }

        /* 背景/外貌折叠区 */
        .story-section {
            background: #252525;
            border-radius: 8px;
            padding: 10px;
            margin-top: 8px;
            font-size: 13px;
            line-height: 1.5;
            color: #bbb;
            max-height: 150px;
            overflow-y: auto;
        }

        .no-players { color: #aaa; text-align: center; margin-top: 20px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; height: auto; }
            .monitor-panel { max-height: 500px; }
            .derived-grid { grid-template-columns: repeat(3, 1fr); }
            .skills-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="main-layout">
    <!-- 左侧聊天区域 -->
    <div class="chat-container">
        <div class="chat-header">
            <a href="/character/create" style="color:#ffaa44; text-decoration:none; font-size:13px; background:#1e1e1e; padding:4px 12px; border-radius:16px; white-space:nowrap;">🎲 车卡向导</a>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message assistant">我是一位克苏鲁呼唤的守秘人，代号"阿卡姆之声"。欢迎踏入不可名状的恐怖世界。</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入消息... (含"搜索"可触发联网)" autofocus>
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <!-- 右侧监控面板 - 完整角色卡 -->
    <div class="monitor-panel" id="monitorPanel">
        <div class="monitor-header">
            <span class="monitor-title">📊 调查员状态监控</span>
            <button class="toggle-btn" id="toggleMonitorBtn" title="收起/展开面板">◀</button>
        </div>
        <div class="monitor-body" id="monitorBody">
            <div id="playersList">
                <div class="no-players">加载中...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let currentAudio = null;
    let playerId = localStorage.getItem('player_id');
    if (!playerId) {
        playerId = 'player_id_0';
        localStorage.setItem('player_id', playerId);
    }
    // 存储展开状态
    let expandedSections = {};

    // ===== 监控面板全局折叠/展开 =====
    const monitorPanel = document.getElementById('monitorPanel');
    const toggleBtn = document.getElementById('toggleMonitorBtn');
    let panelCollapsed = localStorage.getItem('monitorPanelCollapsed') === 'true';

    function applyPanelState() {
        if (panelCollapsed) {
            monitorPanel.classList.add('collapsed');
            toggleBtn.textContent = '▶';
            toggleBtn.title = '展开面板';
        } else {
            monitorPanel.classList.remove('collapsed');
            toggleBtn.textContent = '◀';
            toggleBtn.title = '收起面板';
        }
    }

    function toggleMonitorPanel() {
        panelCollapsed = !panelCollapsed;
        localStorage.setItem('monitorPanelCollapsed', panelCollapsed);
        applyPanelState();
    }

    toggleBtn.addEventListener('click', toggleMonitorPanel);
    applyPanelState();

    // ===== 属性名映射 =====
    const ATTR_LABELS = {
        str: 'STR', con: 'CON', siz: 'SIZ', dex: 'DEX',
        app: 'APP', int: 'INT', pow: 'POW', edu: 'EDU'
    };
    const ATTR_FULL = {
        str: '力量', con: '体质', siz: '体型', dex: '敏捷',
        app: '外貌', int: '智力', pow: '意志', edu: '教育'
    };
    const DERIVED_LABELS = {
        hp: 'HP', mp: 'MP', san: 'SAN', luck: '幸运',
        max_hp: '最大HP', max_san: '最大SAN',
        damage_bonus: '伤害加值', build: '体格'
    };

    // ====== 删除角色 ======
    async function deleteCharacter(playerId, playerName) {
        if (!playerId) return;
        if (!confirm(`确定要删除角色「${playerName}」吗？此操作不可撤销。`)) return;

        try {
            const resp = await fetch(`/api/character/${encodeURIComponent(playerId)}`, {
                method: 'DELETE'
            });
            const result = await resp.json();
            if (result.success) {
                fetchAllPlayers();
            } else {
                alert('删除失败: ' + (result.message || '未知错误'));
            }
        } catch (e) {
            console.error("删除角色失败", e);
            alert('删除角色时发生错误');
        }
    }

    // 获取所有玩家
    async function fetchAllPlayers() {
        try {
            const resp = await fetch('/admin/players');
            if (!resp.ok) { return; }
            const players = await resp.json();
            renderPlayersList(players);
        } catch(e) { console.error("获取玩家列表失败", e); }
    }

    function renderPlayersList(players) {
        const container = document.getElementById('playersList');
        if (!players || players.length === 0) {
            container.innerHTML = '<div class="no-players">暂无其他调查员</div>';
            return;
        }
        let html = '';
        players.forEach(p => {
            html += renderPlayerCard(p);
        });
        container.innerHTML = html;
    }

    function renderPlayerCard(p) {
        const attrs = p.attributes || {};
        const derived = p.derived || {};
        const skills = p.skills || {};
        const items = p.items || [];
        const spells = p.spells || [];
        const sessionIdShort = (p.session_id || '').slice(0, 8);

        // 生成属性条
        let attrsHtml = '';
        const attrKeys = ['str','con','siz','dex','app','int','pow','edu'];
        attrKeys.forEach(k => {
            const val = attrs[k] || 0;
            const pct = Math.min(100, val / 100 * 100);
            attrsHtml += `
                <div class="attr-box">
                    <span class="attr-label" title="${ATTR_FULL[k] || k}">${ATTR_LABELS[k] || k}</span>
                    <span class="attr-value">${val}</span>
                    <div class="attr-bar"><div class="attr-bar-fill" style="width:${pct}%"></div></div>
                </div>`;
        });

        // 衍生属性
        const derivedKeys = [
            {k:'hp', cls:'hp'}, {k:'mp', cls:'mp'}, {k:'san', cls:'san'},
            {k:'luck', cls:'luck'}, {k:'damage_bonus', cls:''}, {k:'build', cls:''}
        ];
        let derivedHtml = '';
        derivedKeys.forEach(({k, cls}) => {
            const val = derived[k];
            if (val === undefined || val === null) return;
            const label = DERIVED_LABELS[k] || k;
            const clsAttr = cls ? `derived-value ${cls}` : 'derived-value';
            // 显示 HP/SAN 为 current/max
            let displayVal = val;
            if (k === 'hp' && derived.max_hp) displayVal = `${val}/${derived.max_hp}`;
            if (k === 'san' && derived.max_san) displayVal = `${val}/${derived.max_san}`;
            derivedHtml += `
                <div class="derived-item">
                    <div class="derived-label">${label}</div>
                    <div class="${clsAttr}">${displayVal}</div>
                </div>`;
        });

        // 技能列表 - 按值排序
        const skillEntries = Object.entries(skills).sort((a, b) => b[1] - a[1]);
        let skillsHtml = '';
        skillEntries.forEach(([name, val]) => {
            skillsHtml += `<div class="skill-item"><span class="skill-name">${escapeHtml(name)}</span><span class="skill-value">${val}%</span></div>`;
        });
        if (!skillsHtml) skillsHtml = '<span class="empty-text">无技能数据</span>';

        // 物品
        let itemsHtml = '';
        if (items.length > 0) {
            items.forEach(item => {
                const itemName = typeof item === 'string' ? item : (item.name || '');
                itemsHtml += `<span class="item-tag">${escapeHtml(itemName)}</span>`;
            });
        } else {
            itemsHtml = '<span class="empty-text">无物品</span>';
        }

        // 法术
        let spellsHtml = '';
        if (spells.length > 0) {
            spells.forEach(sp => {
                const spName = typeof sp === 'string' ? sp : (sp.name || '');
                spellsHtml += `<span class="spell-tag">${escapeHtml(spName)}</span>`;
            });
        }

        // 背景故事/外貌折叠
        const backstory = p.backstory || '';
        const appearance = p.appearance || '';

        const cardId = `card-${p.session_id || '0'}`;
        const secSkills = `${cardId}-skills`;
        const secStory = `${cardId}-story`;
        const showSkills = expandedSections[secSkills] !== false; // default expanded
        const showStory = expandedSections[secStory] === true;    // default collapsed

        return `
            <div class="player-card">
                <div class="card-header">
                    <div>
                        <div class="card-name">${escapeHtml(p.name || '未知')}</div>
                        <div class="card-subtitle">${escapeHtml(p.occupation || '')} · ${p.age || '?'}岁 · ${escapeHtml(p.gender || '')} · ${escapeHtml(p.era || '1920年代')}</div>
                        <div class="card-subtitle">${escapeHtml(p.nationality || '')} · ${escapeHtml(p.residence || '')}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <div class="card-id">ID: ${sessionIdShort}...</div>
                        <button class="delete-btn" onclick="deleteCharacter('${escapeHtml(p.session_id || '')}', '${escapeHtml(p.name || '')}')" title="删除角色卡">✕</button>
                    </div>
                </div>

                <!-- 六维属性 -->
                <div class="attrs-row">${attrsHtml}</div>

                <!-- 衍生属性 -->
                <div class="derived-grid">${derivedHtml}</div>

                <!-- 技能 (默认展开) -->
                <div class="section-title" onclick="toggleSection('${secSkills}')">
                    <span class="arrow">${showSkills ? '▼' : '▶'}</span> 技能 (${skillEntries.length})
                </div>
                <div id="${secSkills}" style="${showSkills ? '' : 'display:none'}">
                    <div class="skills-grid">${skillsHtml}</div>
                </div>

                <!-- 物品 -->
                <div class="section-title" style="border-bottom:none; margin-bottom:4px;">🎒 物品</div>
                <div class="items-list">${itemsHtml}</div>

                ${spellsHtml ? `<div class="section-title" style="border-bottom:none; margin-bottom:4px; margin-top:10px;">🔮 法术</div><div class="items-list">${spellsHtml}</div>` : ''}

                <!-- 背景故事 (默认折叠) -->
                ${backstory ? `
                    <div class="section-title" onclick="toggleSection('${secStory}')">
                        <span class="arrow">${showStory ? '▼' : '▶'}</span> 📖 背景故事
                    </div>
                    <div id="${secStory}" style="${showStory ? '' : 'display:none'}">
                        <div class="story-section">${escapeHtml(backstory)}</div>
                    </div>` : ''}

                <!-- 外貌 (默认折叠) -->
                ${appearance ? `
                    <div class="section-title" style="margin-top:8px;" onclick="toggleSection('${cardId}-appear')">
                        <span class="arrow">▶</span> 👤 外貌描述
                    </div>
                    <div id="${cardId}-appear" style="display:none">
                        <div class="story-section">${escapeHtml(appearance)}</div>
                    </div>` : ''}
            </div>`;
    }

    function toggleSection(id) {
        const el = document.getElementById(id);
        if (!el) return;
        const isHidden = el.style.display === 'none';
        el.style.display = isHidden ? '' : 'none';
        expandedSections[id] = isHidden;
        // 刷新渲染以更新箭头 (实际可优化为局部刷新)
        fetchAllPlayers();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&';
            if (m === '<') return '<';
            if (m === '>') return '>';
            return m;
        });
    }

    // 自动刷新（每5秒）
    let refreshInterval = setInterval(fetchAllPlayers, 5000);
    fetchAllPlayers();

    // ---------- 聊天逻辑 ----------
    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgDiv;
    }

    function appendAssistantWithAudio(replyText, audioBase64) {
        const msgDiv = appendMessage('assistant', replyText);
        if (audioBase64) {
            const btn = document.createElement('button');
            btn.innerHTML = '🔊 播放';
            btn.className = 'audio-btn';
            btn.onclick = () => {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }
                const audioBlob = base64ToBlob(audioBase64, 'audio/wav');
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                currentAudio = audio;
                audio.play();
                audio.onended = () => {
                    URL.revokeObjectURL(audioUrl);
                    currentAudio = null;
                };
            };
            msgDiv.appendChild(btn);
        }
    }

    function base64ToBlob(base64, mimeType) {
        const byteCharacters = atob(base64);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
            byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        return new Blob([byteArray], { type: mimeType });
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;
        userInput.value = '';
        appendMessage('user', message);

        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message assistant';
        loadingDiv.innerText = '守秘人正在沉思...';
        loadingDiv.id = 'loadingMsg';
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        sendBtn.disabled = true;
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Player-Id': playerId
                },
                body: JSON.stringify({ message: message })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            document.getElementById('loadingMsg')?.remove();
            appendAssistantWithAudio(data.reply, data.audio_base64);
        } catch (err) {
            document.getElementById('loadingMsg')?.remove();
            appendMessage('assistant', `❌ 错误：${err.message}`);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    window.addEventListener('beforeunload', () => {
        if (refreshInterval) clearInterval(refreshInterval);
    });
</script>

<!-- ===== PWA Service Worker 注册 ===== -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js')
            .then((reg) => console.log('✅ ServiceWorker 注册成功:', reg.scope))
            .catch((err) => console.log('❌ ServiceWorker 注册失败:', err));
    });
}
</script>
