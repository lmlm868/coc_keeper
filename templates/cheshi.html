<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HTML 标签实例合集</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        section { margin-bottom: 30px; border-bottom: 1px solid #ccc; padding-bottom: 15px; }
        h2 { color: #2c3e50; }
    </style>
</head>
<body>

<section>
    <h2>标题与段落</h2>
    <h1>一级标题</h1>
    <p>这是一个段落。它是块级元素，独占一行。</p>
</section>

<section>
    <h2>列表</h2>
    <ul>
        <li>无序列表项 A</li>
        <li>无序列表项 B</li>
    </ul>
    <ol>
        <li>有序列表项 1</li>
        <li>有序列表项 2</li>
    </ol>
</section>

<section>
    <h2>表格</h2>
    <table border="1">
        <tr><th>产品</th><th>价格</th></tr>
        <tr><td>苹果</td><td>¥5</td></tr>
        <tr><td>香蕉</td><td>¥3</td></tr>
    </table>
</section>

<section>
    <h2>链接与图片</h2>
    <a href="https://www.google.com" target="_blank">打开 Google</a><br><br>
    <img src="https://picsum.photos/150/100" alt="随机图片">
</section>

<section>
    <h2>表单</h2>
    <form>
        <label>姓名：</label>
        <input type="text" placeholder="你的名字"><br><br>
        <label>城市：</label>
        <select>
            <option>北京</option>
            <option>上海</option>
        </select><br><br>
        <button>点我提交</button>
    </form>
</section>

</body>
</html>
