name: 构建 Android APK

on:
  workflow_dispatch:       # 手动触发
  push:
    branches: [main, master]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 设置 Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            android-app/android/**/*.gradle*
            android-app/android/gradle/wrapper/gradle-wrapper.properties

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖并同步
        working-directory: ./android-app
        run: |
          npm install
          npx cap sync android

      - name: 构建 Debug APK
        working-directory: ./android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: coc-keeper-debug-apk
          path: android-app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
