name: 构建 Android APK

on:
  workflow_dispatch:       # 手动触发
  push:
    branches: [main, master]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-app

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 设置 Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 缓存 npm 依赖
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('android-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/android/**/*.gradle*', 'android-app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 安装依赖并同步
        run: |
          npm install
          npx cap sync android

      - name: 授予 gradlew 执行权限
        run: chmod +x ./android/gradlew

      - name: 构建 Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: coc-keeper-debug-apk
          path: android-app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: 构建 Release APK（未签名）
        run: |
          cd android
          ./gradlew assembleRelease

      - name: 上传 Release APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: coc-keeper-release-unsigned-apk
          path: android-app/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
